<div
  class="app-page"
>
  <!-- Main Content -->
  <main class="mx-auto w-full max-w-app space-y-6 p-4 sm:space-y-8 sm:p-6">
    <div class="flex justify-between items-center px-2">
      <h2
        class="text-xl sm:text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2"
      >
        Accounts
        <i
          class="fa-solid fa-building-columns text-sm sm:text-lg opacity-50"
        ></i>
      </h2>

      <button
        (click)="openAddAccountDialog()"
        class="text-white text-xs sm:text-sm font-bold bg-emerald-600 border border-emerald-500 hover:bg-emerald-700 transition-all flex items-center px-3 py-2 rounded-xl gap-2 shadow-lg shadow-emerald-500/20 active:scale-95"
      >
        <i class="fa-solid fa-plus"></i>
        <span class="hidden sm:inline">Add New</span>
      </button>
    </div>

    <!-- Accounts Grid -->
    <div
      class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-8 justify-center"
    >
      @if (accounts().length === 0) {
        <div
          class="col-span-full flex w-full max-w-2xl flex-col items-center justify-center rounded-modal border-2 border-dashed border-slate-200 bg-white/50 py-16 dark:border-slate-700 dark:bg-slate-800/50"
        >
          <div
            class="w-16 h-16 bg-slate-100 dark:bg-slate-700 rounded-full flex items-center justify-center mb-4 text-2xl"
          >
            🏦
          </div>
          <p class="text-slate-500 dark:text-slate-400 font-medium mb-4">
            No accounts found
          </p>
          <button
            (click)="openAddAccountDialog()"
            class="bg-emerald-500 text-white px-6 py-2.5 rounded-2xl font-bold shadow-lg shadow-emerald-500/20"
          >
            Create Your First Account
          </button>
        </div>
      } @else {
        @for (account of accounts(); track account._id) {
          <div class="flex flex-col gap-3 w-full">
            <!-- Square Card -->
            <div
              (click)="
                selectedAccount.set(account); viewAccountDetails(account._id!)
              "
              [class]="account.color"
              class="account-card group relative flex aspect-square cursor-pointer flex-col justify-between overflow-hidden rounded-[1.8rem] p-4 text-white shadow-xl transition-all duration-300 hover:-translate-y-1 sm:rounded-modal sm:p-8 sm:hover:-translate-y-2"
            >
              <div class="relative z-10">
                <div class="flex justify-between items-start">
                  <span
                    class="text-[10px] sm:text-xs uppercase tracking-widest font-bold opacity-80 truncate pr-2"
                  >
                    {{ account.name }}
                  </span>
                </div>
                <h3
                  class="text-lg sm:text-4xl font-black mt-1 sm:mt-4 truncate"
                >
                  €{{ account.balance | number: "1.2-2" }}
                </h3>
              </div>

              <!-- Action Buttons inside the card area to keep the square shape clean -->
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 relative z-10">
                <button
                  class="flex items-center justify-center gap-1 sm:gap-2 p-2 sm:p-2.5 bg-white/20 backdrop-blur-md rounded-xl border border-white/10 hover:bg-white/30 transition-all active:scale-95"
                  (click)="
                    $event.stopPropagation(); openTransaction(account, 'income')
                  "
                >
                  <span class="text-white text-sm sm:text-lg font-bold">+</span>
                  <span
                    class="text-[9px] sm:text-xs font-bold text-white uppercase tracking-tighter sm:tracking-normal"
                    >Income</span
                  >
                </button>
                <button
                  class="flex items-center justify-center gap-1 sm:gap-2 p-2 sm:p-2.5 bg-black/10 backdrop-blur-md rounded-xl border border-white/5 hover:bg-black/20 transition-all active:scale-95"
                  (click)="
                    $event.stopPropagation();
                    openTransaction(account, 'expense')
                  "
                >
                  <span class="text-white text-sm sm:text-lg font-bold">-</span>
                  <span
                    class="text-[9px] sm:text-xs font-bold text-white uppercase tracking-tighter sm:tracking-normal"
                    >Expense</span
                  >
                </button>
              </div>
            </div>
          </div>
        }
      }
    </div>

    <!-- Modals -->
    @if (isModalOpen()) {
      <app-add-account-dialog (close)="updateData()"> </app-add-account-dialog>
    }

    @if (transactionModalOpen() && transactionAccount()) {
      <app-add-transaction-dialog
        [account]="transactionAccount()!"
        [type]="activeTransactionType()"
        (close)="transactionModalOpen.set(false)"
        (transactionSuccess)="updateBalance($event)"
      ></app-add-transaction-dialog>
    }
  </main>
</div>
