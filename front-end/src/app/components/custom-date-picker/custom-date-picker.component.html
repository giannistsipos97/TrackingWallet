<div class="relative w-full">
  <button
    type="button"
    (click)="showCalendar.set(!showCalendar())"
    class="app-input flex items-center justify-between text-left text-sm font-bold focus:ring-slate-400 dark:focus:ring-slate-500"
  >
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-calendar-days text-slate-400 text-base"></i>
      <span>{{ formattedFormDate }}</span>
    </div>
    <i
      class="fa-solid fa-chevron-down text-slate-400 text-xs transition-transform duration-200"
      [ngClass]="{ 'rotate-180': showCalendar() }"
    ></i>
  </button>

  @if (showCalendar()) {
    <div
      class="absolute left-0 right-0 mt-2 p-5 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700/60 rounded-[1.75rem] shadow-2xl z-50 animate-in fade-in slide-in-from-top-2 duration-150"
    >
      <div class="flex items-center justify-between mb-4">
        <h4 class="text-sm font-black text-slate-800 dark:text-white">
          {{ calendarHeader() }}
        </h4>
        <div class="flex gap-1">
          <button
            type="button"
            (click)="changeMonth(-1)"
            class="app-icon-button rounded-lg p-1.5 dark:hover:bg-slate-900"
          >
            <i class="fa-solid fa-chevron-left text-xs"></i>
          </button>
          <button
            type="button"
            (click)="changeMonth(1)"
            class="app-icon-button rounded-lg p-1.5 dark:hover:bg-slate-900"
          >
            <i class="fa-solid fa-chevron-right text-xs"></i>
          </button>
        </div>
      </div>

      <div class="grid grid-cols-7 text-center gap-y-2 mb-2">
        @for (dayName of weekdays; track dayName) {
          <span
            class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500"
          >
            {{ dayName }}
          </span>
        }
      </div>

      <div class="grid grid-cols-7 text-center gap-1">
        @for (day of calendarDays(); track $index) {
          @if (day !== null) {
            <button
              type="button"
              (click)="selectDay(day)"
              [ngClass]="{
                'bg-slate-900 text-white dark:bg-white dark:text-slate-900':
                  isSelected(day),
                'ring-2 ring-inset ring-slate-400':
                  isToday(day) && !isSelected(day),
                'ring-inset': isToday(day) && isSelected(day),
              }"
              class="py-2 text-xs font-bold rounded-xl transition-all hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300"
            >
              {{ day }}
            </button>
          } @else {
            <div class="py-2"></div>
          }
        }
      </div>
    </div>
  }
</div>
