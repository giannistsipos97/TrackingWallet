<div
  class="app-modal-backdrop z-modal"
>
  <div
    class="app-modal-panel-bordered p-8"
  >
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <h3 class="text-xl font-black text-slate-900 dark:text-white">
          Transaction Details
        </h3>
        <button
          (click)="toggleEdit()"
          type="button"
          [ngClass]="{
            'bg-emerald-500 text-white border-emerald-500': !isReadOnly(),
          }"
          class="app-icon-button h-8 w-8 rounded-xl border border-slate-200 active:scale-90 dark:border-slate-700 hover:text-emerald-500"
        >
          <i class="fa-solid fa-pen text-[10px]"></i>
        </button>

        <button
          (click)="isDeleting.set(true)"
          type="button"
          class="app-icon-button h-8 w-8 rounded-xl border border-slate-200 active:scale-90 dark:border-slate-700 hover:text-red-500"
        >
          <i class="fa-solid fa-trash-can text-[10px]"></i>
        </button>
      </div>
      <button
        (click)="close.emit()"
        class="app-icon-button rounded-xl p-2"
      >
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>

    <form [formGroup]="editForm" class="space-y-4">
      <div class="space-y-2">
        <label
          class="app-label tracking-[0.2em] text-slate-400 dark:text-slate-500"
        >
          Transaction Type
        </label>
        <div
          class="relative flex items-center bg-slate-100 dark:bg-slate-900 p-1.5 rounded-2xl border border-transparent dark:border-slate-800/60 transition-all duration-300"
          [ngClass]="{ 'opacity-60': isReadOnly() }"
        >
          <div
            class="absolute top-1.5 bottom-1.5 left-1.5 w-[calc(50%-6px)] rounded-[14px] shadow-md transition-all duration-300 ease-out"
            [ngClass]="{
              'translate-x-full bg-rose-500':
                editForm.get('type')?.value === 'expense',
              'bg-emerald-500': editForm.get('type')?.value === 'income',
            }"
          ></div>

          <button
            type="button"
            [disabled]="isReadOnly()"
            (click)="setTransactionType('income')"
            class="flex-1 text-center py-3 text-xs font-black uppercase tracking-widest z-10 transition-colors duration-200 cursor-pointer disabled:cursor-not-allowed"
            [ngClass]="{
              'text-white': editForm.get('type')?.value === 'income',
              'text-slate-400': editForm.get('type')?.value !== 'income',
              'dark:text-slate-500':
                editForm.get('type')?.value !== 'income' && isReadOnly(),
            }"
          >
            <i class="fa-solid fa-arrow-trend-up mr-2 text-[11px]"></i>Income
          </button>

          <button
            type="button"
            [disabled]="isReadOnly()"
            (click)="setTransactionType('expense')"
            class="flex-1 text-center py-3 text-xs font-black uppercase tracking-widest z-10 transition-colors duration-200 cursor-pointer disabled:cursor-not-allowed"
            [ngClass]="{
              'text-white': editForm.get('type')?.value === 'expense',
              'text-slate-400': editForm.get('type')?.value !== 'expense',
              'dark:text-slate-500':
                editForm.get('type')?.value !== 'expense' && isReadOnly(),
            }"
          >
            <i class="fa-solid fa-arrow-trend-down mr-2 text-[11px]"></i>Expense
          </button>
        </div>
      </div>

      <div>
        <label
          class="app-label"
          >Description</label
        >
        <input
          formControlName="description"
          type="text"
          [readonly]="isReadOnly()"
          [ngClass]="{ 'opacity-60 cursor-not-allowed': isReadOnly() }"
          class="app-input-muted font-semibold"
        />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label
            class="app-label"
            >Amount (€)</label
          >
          <input
            formControlName="amount"
            type="number"
            step="0.01"
            [readonly]="isReadOnly()"
            [ngClass]="{ 'opacity-60 cursor-not-allowed': isReadOnly() }"
            class="app-input-muted font-bold"
          />
        </div>
        <div>
          <label
            class="app-label"
            >Date</label
          >
          <input
            formControlName="date"
            type="date"
            [readonly]="isReadOnly()"
            [ngClass]="{ 'opacity-60 cursor-not-allowed': isReadOnly() }"
            class="app-input-muted font-semibold"
          />
        </div>
      </div>

      <div>
        <label
          class="app-label"
          >Category</label
        >
        <div class="relative">
          <select
            formControlName="category"
            [attr.disabled]="isReadOnly() ? true : null"
            [ngClass]="{ 'opacity-60 cursor-not-allowed': isReadOnly() }"
            class="app-input-muted cursor-pointer appearance-none font-semibold"
          >
            <option *ngFor="let cat of categories" [value]="cat._id">
              {{ cat.name }}
            </option>
          </select>
          @if (!isReadOnly()) {
            <div
              class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"
            >
              <i class="fa-solid fa-chevron-down text-xs"></i>
            </div>
          }
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 pt-4">
        <button
          type="button"
          (click)="close.emit()"
          class="app-button-secondary cursor-pointer p-4"
        >
          {{ isReadOnly() ? "Close" : "Cancel" }}
        </button>

        @if (!isReadOnly()) {
          <button
            type="submit"
            (click)="onSave()"
            [disabled]="editForm.invalid"
            class="app-button-primary cursor-pointer p-4"
          >
            Save Changes
          </button>
        } @else {
          <div
            class="p-4 rounded-2xl bg-slate-50 dark:bg-slate-900/50 flex items-center justify-center select-none"
          >
            <span class="text-xs font-bold tracking-widest text-slate-400"
              >Save Changes</span
            >
          </div>
        }
      </div>
    </form>
  </div>
</div>

@if (isDeleting()) {
  <app-confirm-dialog
    message="Permanently delete this transaction? This will also adjust your account balance."
    (yes)="onDelete()"
    (no)="isDeleting.set(false)"
  >
  </app-confirm-dialog>
}
