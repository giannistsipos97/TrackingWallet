<div
  class="fixed inset-0 z-confirm flex items-center justify-center bg-slate-900/50 backdrop-blur-sm"
>
  <div
    class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl max-w-sm w-full border border-slate-200 dark:border-slate-700"
  >
    <p
      class="text-lg font-bold text-slate-900 dark:text-white text-center mb-8"
    >
      {{ message }}
    </p>

    <div class="flex gap-4">
      <button
        (click)="no.emit()"
        class="app-button-secondary flex-1 rounded-xl py-3"
      >
        No
      </button>
      <button
        (click)="yes.emit()"
        class="app-button-primary flex-1 rounded-xl py-3"
      >
        Yes
      </button>
    </div>
  </div>
</div>
