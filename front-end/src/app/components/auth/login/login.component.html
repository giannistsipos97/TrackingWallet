<div class="animate-in slide-in-from-bottom-10 duration-500">
  <h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">
    Welcome Back
  </h2>
  <p class="text-slate-500 dark:text-slate-400 mb-8">
    Enter your credentials to access your wallet.
  </p>

  @if (errorMessage()) {
    <div
      class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 rounded-2xl text-sm font-medium animate-shake"
    >
      {{ errorMessage() }}
    </div>
  }

  <div class="space-y-4">
    <div>
      <label
        class="app-auth-label"
        >Email Address</label
      >
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="name@email.com"
        class="app-input-bordered"
      />
    </div>

    <div>
      <div class="flex justify-between items-center mb-1 ml-1">
        <label
          class="app-auth-label mb-0 ml-0"
          >Password</label
        >
        <a
          class="text-xs text-emerald-600 dark:text-emerald-400 font-bold hover:underline cursor-pointer"
          >Forgot?</a
        >
      </div>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        class="app-input-bordered"
      />
    </div>

    <button
      (click)="handleLogin()"
      [disabled]="isLoading() || !email() || !password()"
      class="app-button-primary mt-4 w-full bg-emerald-600 py-4 shadow-xl"
    >
      {{ isLoading() ? "Signing in..." : "Sign In" }}
    </button>

    <p class="text-center text-slate-500 dark:text-slate-400 mt-6 text-sm">
      New here?
      <button
        routerLink="/auth/register"
        class="text-emerald-600 dark:text-emerald-400 font-bold ml-1 hover:underline"
      >
        Create an account
      </button>
    </p>
  </div>
</div>
