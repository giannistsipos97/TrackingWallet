<div
  class="app-modal-backdrop z-modal"
>
  <div
    class="app-modal-panel-bordered p-8"
  >
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-xl font-black text-slate-900 dark:text-white">
        Adjust Balance
      </h3>
      <button
        (click)="close.emit()"
        class="app-icon-button rounded-xl p-2"
      >
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="space-y-4">
      <div>
        <label
          class="app-label"
        >
          Current Balance (€)
        </label>
        <input
          [formControl]="balanceControl"
          type="number"
          step="0.01"
          class="app-input-muted text-2xl font-bold"
          placeholder="0.00"
        />
      </div>

      <div class="grid grid-cols-2 gap-3 pt-4">
        <button
          (click)="close.emit()"
          class="app-button-secondary p-4"
        >
          Cancel
        </button>
        <button
          (click)="save()"
          class="app-button-primary p-4"
        >
          Save Changes
        </button>
      </div>
    </div>
  </div>
</div>
