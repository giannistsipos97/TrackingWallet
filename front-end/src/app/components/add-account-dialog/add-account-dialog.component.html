<div
  class="app-modal-backdrop z-50"
>
  <div
    class="app-modal-panel p-8 animate-in fade-in zoom-in duration-300"
  >
    <div class="flex justify-between items-center mb-8">
      <h3 class="text-2xl font-black text-slate-900 dark:text-white">
        New Account
      </h3>
      <button
        (click)="close.emit()"
        class="fas fa-times app-icon-button rounded-xl p-2"
      ></button>
    </div>

    <form [formGroup]="accountForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label
          class="app-label"
          >Account Name</label
        >
        <input
          type="text"
          formControlName="name"
          placeholder="e.g. Main Savings"
          class="app-input"
        />
      </div>

      <div>
        <label
          class="app-label"
          >Initial Balance</label
        >
        <div class="relative">
          <span
            class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400"
            >€</span
          >
          <input
            type="number"
            formControlName="balance"
          class="app-input pl-10"
          />
        </div>
      </div>

      <div class="space-y-4">
        <label
          class="app-label tracking-[0.2em]"
        >
          Choose Style
        </label>

        <div class="flex flex-wrap gap-4">
          @for (color of colorPresets; track color.class) {
            <button
              type="button"
              (click)="accountForm.patchValue({ color: color.class })"
              [class]="color.class"
              class="w-12 h-12 rounded-2xl transition-all duration-200 flex items-center justify-center shadow-lg hover:scale-110 active:scale-95 relative"
            >
              @if (accountForm.get("color")?.value === color.class) {
                <div
                  class="absolute inset-0 border-4 border-white rounded-2xl"
                ></div>
              }
            </button>
          }
        </div>
      </div>

      <div class="flex gap-4 pt-4">
        <button
          type="button"
          (click)="close.emit()"
          class="app-button-ghost flex-1 py-4"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="accountForm.invalid"
          class="app-button-primary flex-1 py-4"
        >
          Create Account
        </button>
      </div>
    </form>
  </div>
</div>
