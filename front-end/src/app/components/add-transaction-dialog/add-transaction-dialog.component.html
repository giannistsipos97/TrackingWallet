<div
  class="app-modal-backdrop z-modal"
>
  <div
    class="app-modal-panel relative animate-in fade-in zoom-in duration-200"
  >
    <!-- Header -->
    <div class="p-8 pb-0 flex justify-between items-center">
      <div>
        <h3
          class="text-2xl font-black text-slate-900 dark:text-white capitalize"
        >
          Add
          <!-- Dynamic Color for the word Income/Expense -->
          <span
            [class]="type === 'income' ? 'text-emerald-500' : 'text-rose-500'"
          >
            {{ type }}
          </span>
        </h3>

        <p
          class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1"
        >
          Target: {{ account.name }}
        </p>

        <!-- Balanced text color for both light/dark modes -->
        <div
          class="mt-2 inline-block px-3 py-1 rounded-full bg-slate-100 dark:bg-slate-900"
        >
          <span
            class="text-[13px] font-black text-slate-500 dark:text-slate-400 uppercase mr-1"
            >Balance:
          </span>
          <span class="text-l font-bold text-slate-700 dark:text-slate-200">
            {{ account.balance | currency: "EUR" : "symbol" }}
          </span>
        </div>
      </div>

      <button
        (click)="close.emit()"
        class="app-icon-button rounded-xl p-2"
      >
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>

    <form
      [formGroup]="transactionForm"
      (ngSubmit)="onSubmit()"
      class="p-8 space-y-5"
    >
      <!-- Amount Input -->
      <div class="space-y-2">
        <label
          class="app-label tracking-[0.2em] text-black"
          >Amount</label
        >
        <div class="relative">
          <span
            class="absolute left-5 top-1/2 -translate-y-1/2 font-bold"
            [class]="type === 'income' ? 'text-emerald-500' : 'text-rose-500'"
            >€</span
          >
          <input
            type="number"
            formControlName="amount"
            step="0.01"
            class="app-input p-5 pl-10 text-2xl font-black"
            [ngClass]="{
              'focus:ring-emerald-500': type === 'income',
              'focus:ring-rose-500': type === 'expense',
            }"
          />
        </div>
      </div>

      <!-- Description -->
      <div class="space-y-2">
        <label
          class="app-label tracking-[0.2em] text-black"
          >Description</label
        >
        <input
          type="text"
          formControlName="description"
          placeholder="What was this for?"
          class="app-input focus:ring-slate-400"
        />
      </div>

      <div class="space-y-2">
        <label
          class="app-label tracking-[0.2em] text-black"
        >
          Transaction Date
        </label>
        <app-custom-date-picker formControlName="date"></app-custom-date-picker>
      </div>

      <!-- Category Picker -->
      <div class="space-y-2">
        <label
          class="app-label tracking-[0.2em] text-black"
          >Category</label
        >
        <select
          formControlName="category"
          class="app-select border-none focus:ring-slate-400"
        >
          <option [ngValue]="null" disabled>Select Category</option>
          @for (category of categories(); track category._id) {
            <option [ngValue]="category">
              {{ category.name }}
            </option>
          }
        </select>
      </div>

      <!-- Submit Button -->
      <div class="flex gap-4 pt-4">
        <button
          type="button"
          (click)="close.emit()"
          class="app-button-ghost flex-1 py-4 text-slate-400"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="transactionForm.invalid"
          class="flex-1 cursor-pointer rounded-2xl py-4 font-bold text-white shadow-lg transition-all active:scale-95 disabled:opacity-50"
          [ngClass]="{
            'bg-emerald-500 shadow-emerald-500/20': type === 'income',
            'bg-rose-500 shadow-rose-500/20': type === 'expense',
          }"
        >
          Confirm
        </button>
      </div>
    </form>
  </div>
</div>
