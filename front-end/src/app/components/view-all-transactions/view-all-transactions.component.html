<div
  class="app-modal-backdrop z-[90] animate-in fade-in duration-200"
>
  <div
    class="flex h-[80vh] w-full max-w-2xl flex-col overflow-hidden rounded-modal border border-slate-100 bg-white shadow-2xl dark:border-slate-700 dark:bg-slate-800"
  >
    <div class="p-8 pb-4 flex items-center justify-between gap-4">
      <div
        class="flex-1 flex flex-col sm:flex-row sm:items-center justify-between gap-3"
      >
        <div>
          <h3 class="text-2xl font-black text-slate-900 dark:text-white">
            Full History
          </h3>
          <p class="text-sm text-slate-500">
            {{ transactions().length }} transactions found
          </p>
        </div>

        <div class="w-full sm:w-48">
          <select
            [ngModel]="selectedMonthSelection()"
            (ngModelChange)="
              selectedMonthSelection.set($event); onMonthChange()
            "
            class="app-select p-2.5 text-xs font-bold"
          >
            @for (option of monthOptions; track option.label) {
              <option [ngValue]="option">{{ option.label }}</option>
            }
          </select>
        </div>
      </div>

      <button
        (click)="close.emit()"
        class="app-icon-button h-10 w-10 flex-shrink-0 rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600"
      >
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto pb-8 custom-scrollbar">
      <div class="px-4">
        @if (!isLoading()) {
          <app-transaction-list
            [transactions]="transactions()"
            (edit)="onEdit($event)"
          >
          </app-transaction-list>
        } @else {
          <div
            class="p-20 text-center text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 animate-pulse"
          >
            <i
              class="fa-solid fa-spinner fa-spin mr-2 text-emerald-500 text-sm"
            ></i>
            Fetching ledger records...
          </div>
        }
      </div>
    </div>
  </div>
</div>
